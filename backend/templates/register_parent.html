
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Create Parent Account</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f6fa;
      margin: 0;
    }

    .card {
      max-width: 420px;
      margin: 90px auto;
      background: white;
      padding: 28px;
      border-radius: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
      border-radius: 8px;
      border: 1px solid #ddd;
      font-family: inherit;
    }

    button {
      background: linear-gradient(to right, #d16ba5, #c777b9);
      color: white;
      border: 0;
      cursor: pointer;
      font-weight: bold;
    }

    .msg {
      background: #fff8d6;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    a {
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Create Parent Account</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="msg">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <input name="household_name" placeholder="Household name (optional)">
      <input name="email" type="email" placeholder="Email" required>
      <input name="password" type="password" placeholder="Password" required>
      <button type="submit">Create Account</button>
    </form>

    <p><a href="/login">Back to login</a></p>
  </div>
</body>
</html>
